methodology_summary: >
  Two-stage ranking pipeline. Stage 1 applies cheap heuristic scoring (keyword matches,
  experience-band fit, behavioral signals, honeypot detection) across the full candidate
  pool to select the top 3000. Stage 2 re-ranks these using sentence-transformer embeddings
  compared against the JD. Honeypot detection targets impossible skill-tenure and
  non-technical job titles with stuffed AI keywords. Reasoning is generated per-candidate
  with JD-specific justification and honest concerns rather than a fixed template.
